name: Release
on:
  push:
    tags: ["v*"]
permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
      - name: Install cargo-wix
        run: cargo install cargo-wix --version ^0.3
      - run: cargo build --release
      - run: cargo test --all
      - name: Package zip
        shell: bash
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          DIR="LeopardWM-${VERSION}-x86_64-windows"
          mkdir "$DIR"
          cp target/x86_64-pc-windows-msvc/release/leopardwm.exe "$DIR/"
          cp target/x86_64-pc-windows-msvc/release/leopardwm-cli.exe "$DIR/"
          cp target/x86_64-pc-windows-msvc/release/lwm.exe "$DIR/"
          cp target/x86_64-pc-windows-msvc/release/leopardwm-watchdog.exe "$DIR/"
          cp README.md LICENSE "$DIR/"
          7z a "${DIR}.zip" "$DIR"
      - name: Build MSI installer
        shell: bash
        run: |
          # WiX 3.14 is pre-installed at this path on windows-latest runners.
          cargo wix -p leopardwm-daemon -I wix/main.wxs \
            --target x86_64-pc-windows-msvc \
            --no-build --nocapture \
            --bin-path "C:\Program Files (x86)\WiX Toolset v3.14\bin"
          ls target/wix/*.msi
      - name: Extract changelog
        id: changelog
        shell: bash
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          # Extract the section for this version from CHANGELOG.md
          NOTES=$(awk "/^## \\[?${VERSION//./\\.}\\]?/{found=1; next} /^## /{if(found) exit} found{print}" CHANGELOG.md 2>/dev/null || true)
          if [ -z "$NOTES" ]; then
            echo "body=" >> $GITHUB_OUTPUT
          else
            # Use a delimiter for multiline output
            EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
            echo "body<<$EOF" >> $GITHUB_OUTPUT
            echo "$NOTES" >> $GITHUB_OUTPUT
            echo "$EOF" >> $GITHUB_OUTPUT
          fi
      - name: Generate SHA256 checksums
        shell: bash
        run: |
          sha256sum LeopardWM-*.zip > checksums.txt
          sha256sum target/wix/*.msi >> checksums.txt
          cat checksums.txt
      - uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        id: gh_release
        with:
          files: |
            LeopardWM-*.zip
            target/wix/*.msi
            checksums.txt
          body: ${{ steps.changelog.outputs.body }}
          generate_release_notes: ${{ steps.changelog.outputs.body == '' }}

  publish-winget:
    needs: build
    runs-on: windows-latest
    # WINGET_TOKEN must be a CLASSIC PAT with the `public_repo` scope (not a
    # fine-grained PAT — those can't open the upstream PR). The action forks
    # microsoft/winget-pkgs to the token owner's account on first run, then
    # opens a version-bump PR from that fork.
    if: ${{ !github.event.repository.fork }}
    steps:
      - uses: vedantmgoyal9/winget-releaser@main
        with:
          identifier: jcardama.LeopardWM
          installers-regex: '\.msi$'
          token: ${{ secrets.WINGET_TOKEN }}
        # No continue-on-error: a winget failure should surface as a failed
        # job (the GitHub Release is already published by the `build` job, so
        # this can't block the release) rather than silently no-op for months.
