name: Release
on:
  push:
    tags: ["v*"]
permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo build --release
      - run: cargo test --all
      - name: Package
        shell: bash
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          DIR="LeopardWM-${VERSION}-x86_64-windows"
          mkdir "$DIR"
          cp target/x86_64-pc-windows-msvc/release/leopardwm.exe "$DIR/"
          cp target/x86_64-pc-windows-msvc/release/leopardwm-cli.exe "$DIR/"
          cp README.md LICENSE "$DIR/"
          7z a "${DIR}.zip" "$DIR"
      - name: Extract changelog
        id: changelog
        shell: bash
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          # Extract the section for this version from CHANGELOG.md
          NOTES=$(awk "/^## \\[?${VERSION//./\\.}\\]?/{found=1; next} /^## /{if(found) exit} found{print}" CHANGELOG.md 2>/dev/null || true)
          if [ -z "$NOTES" ]; then
            echo "body=" >> $GITHUB_OUTPUT
          else
            # Use a delimiter for multiline output
            EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
            echo "body<<$EOF" >> $GITHUB_OUTPUT
            echo "$NOTES" >> $GITHUB_OUTPUT
            echo "$EOF" >> $GITHUB_OUTPUT
          fi
      - uses: softprops/action-gh-release@v2
        with:
          files: LeopardWM-*.zip
          body: ${{ steps.changelog.outputs.body }}
          generate_release_notes: ${{ steps.changelog.outputs.body == '' }}
